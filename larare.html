<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lärare - Tal till text</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #4CAF50; padding: 15px; border-radius: 8px; margin-bottom: 20px; background-color: #f9fff9; }
        
        input { padding: 10px; font-size: 16px; width: 60%; margin-right: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        
        .btn-skapa { background-color: #2196F3; }
        #startBtn { background-color: #4CAF50; }
        #stoppBtn { background-color: #f44336; display: none; } 
        
        #utskrift { margin-top: 20px; padding: 15px; background: #f4f4f4; min-height: 100px; border-radius: 5px; line-height: 1.6; font-size: 1.1em; }
        .gömd { display: none; }
    </style>
</head>
<body>

    <h1>Lärarvy 🎤</h1>
    
    <div id="steg1-skapa" class="box" style="border-color: #2196F3; background-color: #f0f8ff;">
        <p><strong>1. Hitta på en egen rumskod (t.ex. matte7b):</strong></p>
        <input type="text" id="onskadKod" placeholder="Skriv din kod här...">
        <button class="btn-skapa" onclick="skapaRum()">Skapa rum</button>
        <p id="felmeddelande" style="color: red; font-weight: bold;"></p>
    </div>
    
    <div id="steg2-igang" class="gömd">
        <div class="box">
            <p><strong>Ge denna rumskod till eleverna:</strong> <span id="rumskod" style="font-size: 1.5em; font-weight: bold; color: #d32f2f;"></span></p>
            <p>Antal anslutna elever: <span id="antal-elever">0</span></p>
        </div>

        <button id="startBtn" onclick="startaMicken()">▶ Starta mikrofonen</button>
        <button id="stoppBtn" onclick="stoppaMicken()">⏹ Stoppa mikrofonen</button>
        
        <div id="utskrift">
            <em>När du startar mikrofonen hamnar din text här...</em>
        </div>
    </div>

    <script>
        let peer;
        let anslutnaElever = [];
        let avsiktligtStoppad = true; 
        
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'sv-SE';
        recognition.continuous = true;
        recognition.interimResults = false;

        function skapaRum() {
            let onskadKod = document.getElementById('onskadKod').value.trim().toLowerCase();
            
            if (!onskadKod) {
                onskadKod = Math.floor(1000 + Math.random() * 9000).toString();
            }

            document.getElementById('felmeddelande').innerText = "Skapar rum...";

            // HÄR ÄR TILLÄGGET: Googles STUN-server som "kartläsare"
            peer = new Peer(onskadKod, {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', function(id) {
                document.getElementById('steg1-skapa').classList.add('gömd');
                document.getElementById('steg2-igang').classList.remove('gömd');
                document.getElementById('rumskod').innerText = id;
            });

            peer.on('error', function(err) {
                if (err.type === 'unavailable-id') {
                    document.getElementById('felmeddelande').innerText = "Koden används redan. Hitta på en ny!";
                } else {
                    document.getElementById('felmeddelande').innerText = "Nätverksfel: " + err.type;
                }
            });

            peer.on('connection', function(conn) {
                anslutnaElever.push(conn);
                document.getElementById('antal-elever').innerText = anslutnaElever.length;
            });
        }

        recognition.onresult = function(event) {
            let nyskapadText = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    nyskapadText += event.results[i][0].transcript + ' ';
                }
            }
            
            if (nyskapadText.trim() !== '') {
                const span = document.createElement('span');
                span.innerText = nyskapadText + ' ';
                
                if (document.getElementById('utskrift').innerHTML.includes('<em>')) {
                    document.getElementById('utskrift').innerHTML = '';
                }
                
                document.getElementById('utskrift').appendChild(span);

                anslutnaElever.forEach(conn => {
                    conn.send(nyskapadText);
                });
            }
        };

        recognition.onend = function() {
            if (!avsiktligtStoppad) {
                recognition.start();
            }
        };

        recognition.onerror = function(event) {
            console.error("Mikrofon-fel:", event.error);
        };

        function startaMicken() {
            avsiktligtStoppad = false; 
            try { recognition.start(); } catch(e) {} 
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stoppBtn').style.display = 'inline-block';
        }

        function stoppaMicken() {
            avsiktligtStoppad = true; 
            recognition.stop();
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stoppBtn').style.display = 'none';
        }
    </script>

</body>
</html>
