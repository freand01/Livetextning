<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elev - Liveöversättning</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #2196F3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; width: 60%; margin-right: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #svart-tavla { margin-top: 20px; font-size: 1.2em; line-height: 1.6; }
        .ny-text { margin-right: 4px; }
        #google_translate_element { margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Elevvy 🎧</h1>

    <div id="google_translate_element"></div>
    
    <div class="box" id="anslutningsbox">
        <p>Skriv in koden du fått av din lärare:</p>
        <input type="text" id="lararKod" placeholder="t.ex. matte7b">
        <button onclick="anslutTillLarare()">Anslut</button>
    </div>

    <div id="status" style="color: green; font-weight: bold; margin-bottom: 20px;"></div>

    <div id="svart-tavla"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'sv' }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Korrekt länk för Belgien-servern:
        const firebaseConfig = {
            databaseURL: "https://livetextning-43edb-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            
            // En liten vakt som håller koll på om lektionen faktiskt har startat
            let lektionHarBorjat = false;

            // Fäster funktionen på window så HTML-knappen hittar den
            window.anslutTillLarare = function() {
                const kod = document.getElementById('lararKod').value.trim().toLowerCase();
                
                if (!kod) {
                    alert("Du måste skriva in en kod!");
                    return; 
                }

                document.getElementById('status').innerText = "Du är ansluten! Väntar på att läraren ska prata...";
                document.getElementById('status').style.color = "green";
                document.getElementById('anslutningsbox').style.display = 'none';

                const rumRef = ref(db, 'rum/' + kod);
                
                // Lyssna på ny text
                onChildAdded(rumRef, (snapshot) => {
                    lektionHarBorjat = true; // Nu vet vi att lektionen är igång!
                    
                    const data = snapshot.val();
                    const span = document.createElement('span');
                    span.className = 'ny-text';
                    span.innerText = data.text + ' '; 
                    
                    document.getElementById('svart-tavla').appendChild(span);
                    window.scrollTo(0, document.body.scrollHeight);
                }, (error) => {
                    console.error(error);
                    document.getElementById('status').innerText = "Databasfel: Åtkomst nekad. Har läraren skapat rummet ännu?";
                    document.getElementById('status').style.color = "red";
                });

                // Lyssna ifall läraren stänger ner (och raderar databasen)
                onValue(rumRef, (snapshot) => {
                    if (lektionHarBorjat && !snapshot.exists()) {
                        // Den nya logiska texten när läraren stänger fliken
                        document.getElementById('status').innerText = "Lektionen har avslutats. Texten är raderad från molnet, men ligger kvar på din skärm så att du kan läsa klart. Allt försvinner när du stänger denna flik.";
                        document.getElementById('status').style.color = "#d32f2f"; 
                    }
                });
            };

        } catch (kritiskFel) {
            document.getElementById('status').innerText = "Ett allvarligt fel uppstod vid laddning. Fel: " + kritiskFel.message;
            document.getElementById('status').style.color = "red";
        }
    </script>
</body>
</html>
