<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lärare - Tal till text</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #4CAF50; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        /* Knappar */
        button { padding: 10px 20px; font-size: 16px; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        #startBtn { background-color: #4CAF50; }
        #stoppBtn { background-color: #f44336; display: none; } /* Dold från början */
        
        #utskrift { margin-top: 20px; padding: 15px; background: #f4f4f4; min-height: 100px; border-radius: 5px; line-height: 1.6; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Lärarvy 🎤</h1>
    
    <div class="box">
        <p><strong>Ge denna rumskod till eleverna:</strong> <span id="rumskod" style="font-size: 1.5em; font-weight: bold; color: #d32f2f;">Laddar...</span></p>
        <p>Antal anslutna elever: <span id="antal-elever">0</span></p>
    </div>

    <button id="startBtn" onclick="startaMicken()">▶ Starta mikrofonen</button>
    <button id="stoppBtn" onclick="stoppaMicken()">⏹ Stoppa mikrofonen</button>
    
    <div id="utskrift">
        </div>

    <script>
        const peer = new Peer();
        let anslutnaElever = [];
        
        // Vår nya vaktmästare-variabel
        let avsiktligtStoppad = true; 

        peer.on('open', function(id) {
            document.getElementById('rumskod').innerText = id;
        });

        peer.on('connection', function(conn) {
            anslutnaElever.push(conn);
            document.getElementById('antal-elever').innerText = anslutnaElever.length;
        });

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'sv-SE';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            let nyskapadText = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    nyskapadText += event.results[i][0].transcript + ' ';
                }
            }
            
            if (nyskapadText.trim() !== '') {
                const span = document.createElement('span');
                span.innerText = nyskapadText + ' ';
                document.getElementById('utskrift').appendChild(span);

                anslutnaElever.forEach(conn => {
                    conn.send(nyskapadText);
                });
            }
        };

        // Här är magin som väcker mikrofonen om Chrome snålar!
        recognition.onend = function() {
            if (!avsiktligtStoppad) {
                // Om vi INTE tryckte på stopp, starta micken igen direkt
                recognition.start();
            }
        };

        recognition.onerror = function(event) {
            console.error("Mikrofon-fel:", event.error);
        };

        // Funktion för att starta
        function startaMicken() {
            avsiktligtStoppad = false; // Berätta för systemet att vi vill köra
            try {
                recognition.start();
            } catch(e) {} // Förhindrar krasch om den redan lyssnade
            
            // Byt vilka knappar som syns
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stoppBtn').style.display = 'inline-block';
            
            // Rensa textrutan för en ny lektion (valfritt)
            document.getElementById('utskrift').innerHTML = ''; 
        }

        // Funktion för att stoppa
        function stoppaMicken() {
            avsiktligtStoppad = true; // Berätta att vi faktiskt vill stänga av
            recognition.stop();
            
            // Byt tillbaka knapparna
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stoppBtn').style.display = 'none';
        }
    </script>

</body>
</html>
