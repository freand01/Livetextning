<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elev - Liveöversättning</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #2196F3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; width: 60%; margin-right: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #svart-tavla { margin-top: 20px; font-size: 1.2em; line-height: 1.6; }
        .ny-text { margin-right: 4px; }
        
        /* Design för den nya översättningsmenyn */
        #google_translate_element { margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Elevvy 🎧</h1>

    <div id="google_translate_element"></div>
    
    <div class="box" id="anslutningsbox">
        <p>Skriv in koden du fått av din lärare:</p>
        <input type="text" id="lararKod" placeholder="T.ex. abc-123-def">
        <button onclick="anslutTillLarare()">Anslut</button>
    </div>

    <div id="status" style="color: green; font-weight: bold; margin-bottom: 20px;"></div>

    <div id="svart-tavla">
        </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'sv'
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const peer = new Peer();

        function anslutTillLarare() {
            const kod = document.getElementById('lararKod').value.trim();
            if (!kod) return alert("Du måste skriva in en kod!");

            document.getElementById('status').innerText = "Ansluter...";

            const conn = peer.connect(kod);

            conn.on('open', function() {
                document.getElementById('status').innerText = "Du är ansluten! Väntar på att läraren ska prata...";
                document.getElementById('anslutningsbox').style.display = 'none';
            });

            conn.on('data', function(nyskapadText) {
                const span = document.createElement('span');
                span.className = 'ny-text';
                
                // Lägger till texten med ett litet mellanslag efter varje fras
                span.innerText = nyskapadText + ' '; 
                
                const tavla = document.getElementById('svart-tavla');
                tavla.appendChild(span);
                
                // Scrolla ner automatiskt till botten av sidan
                window.scrollTo(0, document.body.scrollHeight);
            });
            
            conn.on('error', function(err) {
                alert("Kunde inte ansluta: " + err);
            });
        }
    </script>

</body>
</html>
