<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elev - Liveöversättning</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .box { border: 2px solid #2196F3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; width: 60%; margin-right: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #svart-tavla { margin-top: 20px; font-size: 1.2em; line-height: 1.6; }
        .ny-text { margin-right: 4px; }
        #google_translate_element { margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>Elevvy 🎧</h1>

    <div id="google_translate_element"></div>
    
    <div class="box" id="anslutningsbox">
        <p>Skriv in koden du fått av din lärare:</p>
        <input type="text" id="lararKod" placeholder="t.ex. matte7b">
        <button onclick="anslutTillLarare()">Anslut</button>
    </div>

    <div id="status" style="color: green; font-weight: bold; margin-bottom: 20px;"></div>

    <div id="svart-tavla"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'sv' }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // Vi hämtar onChildAdded för att lyssna när ny text läggs till, och onValue för att veta om läraren stänger rummet
        import { getDatabase, ref, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // *** KLISTRA IN DIN KOPIERADE LÄNK HÄR MELLAN CITATTECKNEN ***
        const firebaseConfig = {
            databaseURL: "https://console.firebase.google.com/u/0/project/livetextning-43edb/database/livetextning-43edb-default-rtdb/data/~2F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.anslutTillLarare = function() {
            const kod = document.getElementById('lararKod').value.trim().toLowerCase();
            if (!kod) return alert("Du måste skriva in en kod!");

            document.getElementById('status').innerText = "Du är ansluten! Väntar på att läraren ska prata...";
            document.getElementById('anslutningsbox').style.display = 'none';

            const rumRef = ref(db, 'rum/' + kod);
            
            // Lyssna på ny text
            onChildAdded(rumRef, (snapshot) => {
                const data = snapshot.val();
                
                const span = document.createElement('span');
                span.className = 'ny-text';
                span.innerText = data.text + ' '; 
                
                document.getElementById('svart-tavla').appendChild(span);
                window.scrollTo(0, document.body.scrollHeight);
            });

            // Lyssna ifall läraren stänger ner (och databasen självraderas)
            onValue(rumRef, (snapshot) => {
                if (!snapshot.exists()) {
                    document.getElementById('status').innerText = "Lektionen har avslutats och texten är raderad.";
                    document.getElementById('status').style.color = "red";
                }
            });
        }
    </script>
</body>
</html>
